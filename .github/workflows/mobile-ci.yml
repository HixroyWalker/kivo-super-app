name: Mobile CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./mobile

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Format code
      run: flutter format --set-exit-if-changed .
      
    - name: Analyze code
      run: flutter analyze
      
    # - name: Run tests
    #   run: flutter test # Uncomment when Flutter widget tests are added
