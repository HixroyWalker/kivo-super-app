name: kivo
description: A closed-loop Super App for the Jamaican market.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^3.2.0
  provider: ^6.1.1
  youtube_player_flutter: ^8.1.2
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
