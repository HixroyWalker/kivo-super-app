workflows:
  flutter-ios-android-release:
    name: Kivo Super App Release Pipeline
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_keystore
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      # Replace these with the actual Integration Names you set in Codemagic Team Settings
      app_store_connect: "Apple Connect"
      google_play: "Google Connect"
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/mobile/android/local.properties"
      - name: Get Flutter packages
        script: |
          cd mobile
          flutter packages pub get
      - name: Install iOS Pods
        script: |
          cd mobile/ios
          pod install
      - name: Build iOS App (IPA)
        script: |
          cd mobile
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
      - name: Build Android App Bundle (AAB)
        script: |
          cd mobile
          flutter build appbundle --release
    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - mobile/build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - yourmail@example.com # Update this in Codemagic UI
        notify:
          success: true
          failure: true
      # Uploads to TestFlight using the Team Integration
      app_store_connect:
        auth: integration
      # Uploads to Google Play using the Team Integration
      google_play:
        track: internal
